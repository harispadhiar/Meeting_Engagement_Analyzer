name: Sync to Hugging Face
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://harispadhiar:$HF_TOKEN@huggingface.co/spaces/harispadhiar/Meeting_Engagement_Analyzer
          git push --force hf main
